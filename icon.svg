<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="dusk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2b1d4f"/>
      <stop offset="0.55" stop-color="#7a2f4e"/>
      <stop offset="1" stop-color="#e8843c"/>
    </linearGradient>
  </defs>
  <!-- Fond crépusculaire arrondi -->
  <rect x="0" y="0" width="128" height="128" rx="26" fill="url(#dusk)"/>
  <!-- Soleil couchant derrière Eneko -->
  <circle cx="64" cy="84" r="36" fill="#f6c453" opacity="0.5"/>
  <!-- Sabre du grand-père dans le dos (lame + garde + poignée) -->
  <g transform="rotate(-38 64 64)">
    <rect x="60" y="6" width="7" height="58" rx="3.5" fill="#d9dfe8"/>
    <rect x="53" y="62" width="21" height="6" rx="3" fill="#8a5a2b"/>
    <rect x="59" y="68" width="9" height="22" rx="4" fill="#4a3018"/>
  </g>
  <!-- Buste : kimono sombre, col clair -->
  <path d="M26 128 L38 94 Q64 85 90 94 L102 128 Z" fill="#27314f"/>
  <path d="M50 98 L64 118 L78 98 L64 105 Z" fill="#e5e9f0"/>
  <!-- Oreilles -->
  <circle cx="38" cy="66" r="6" fill="#f2c49b"/>
  <circle cx="90" cy="66" r="6" fill="#f2c49b"/>
  <!-- Visage -->
  <circle cx="64" cy="64" r="27" fill="#f2c49b"/>
  <!-- Cheveux courts, arc sur le haut du crâne -->
  <path d="M37 62 Q37 33 64 32 Q91 33 91 62 L84 62 Q84 42 64 41 Q44 42 44 62 Z" fill="#241d26"/>
  <path d="M40 52 Q46 36 64 35 Q82 36 88 52 Q80 40 64 40 Q48 40 40 52 Z" fill="#241d26"/>
  <!-- Chignon de samouraï (chonmage) + lien -->
  <ellipse cx="64" cy="27" rx="10" ry="7" fill="#241d26"/>
  <rect x="59" y="29" width="10" height="4" rx="2" fill="#8a5a2b"/>
  <!-- Bandeau rouge (hachimaki) -->
  <rect x="39" y="47" width="50" height="8" rx="4" fill="#b3332c"/>
  <rect x="39" y="47" width="50" height="3" rx="1.5" fill="#d4463c"/>
  <!-- Sourcils et yeux déterminés -->
  <rect x="48" y="57" width="11" height="3" rx="1.5" fill="#241d26" transform="rotate(-8 53 58)"/>
  <rect x="69" y="57" width="11" height="3" rx="1.5" fill="#241d26" transform="rotate(8 75 58)"/>
  <rect x="50" y="62" width="8" height="5" rx="2.5" fill="#241d26"/>
  <rect x="70" y="62" width="8" height="5" rx="2.5" fill="#241d26"/>
  <!-- Bouche résolue -->
  <path d="M58 78 Q64 81 70 78" stroke="#a2643c" stroke-width="2.4" fill="none" stroke-linecap="round"/>
  <!-- LES BOUCLES D'OREILLES DORÉES d'Eneko, sa signature -->
  <circle cx="38" cy="76" r="5" fill="none" stroke="#f6c453" stroke-width="3"/>
  <circle cx="90" cy="76" r="5" fill="none" stroke="#f6c453" stroke-width="3"/>
  <circle cx="38" cy="71.5" r="1.6" fill="#f6c453"/>
  <circle cx="90" cy="71.5" r="1.6" fill="#f6c453"/>
</svg>
