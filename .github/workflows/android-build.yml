name: Build Android APK

on:
  push:
  workflow_dispatch: {}

env:
  GODOT_VERSION: 4.6.3
  EXPORT_NAME: eneko
  # Secrets de signature release (facultatifs) : si le keystore n'est pas
  # configuré, le build retombe automatiquement sur une APK debug.
  ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
  ANDROID_KEYSTORE_USER: ${{ secrets.ANDROID_KEYSTORE_USER }}
  ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}

permissions:
  contents: write

jobs:
  export-android:
    name: Export Android APK
    runs-on: ubuntu-24.04
    container:
      image: barichello/godot-ci:4.6.3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup export templates and Android/Java editor config
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates/
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          mkdir -v -p ~/.config/
          mv /root/.config/godot ~/.config/godot

      - name: Import project resources
        run: godot --headless --verbose --editor --quit

      # Exécute réellement chaque scène quelques secondes en headless et
      # remonte les erreurs runtime (les erreurs de compilation seules ne
      # suffisent pas : un niveau peut compiler et planter au chargement).
      - name: Smoke test des scènes (headless)
        run: |
          set +e
          for scene in scenes/main_menu scenes/level_select levels/level_1 levels/level_2 levels/level_3 levels/level_4 levels/level_5 levels/level_6 levels/level_7 levels/level_8 levels/level_9 levels/level_10 levels/level_11 levels/level_12 levels/level_13 levels/level_14 levels/level_15 levels/level_16 levels/level_17 levels/level_secret; do
            echo "=== SMOKE TEST: $scene ==="
            timeout 12 godot --headless --path . "res://$scene.tscn" > "/tmp/smoke.log" 2>&1
            grep -E "SCRIPT ERROR|Parse Error|Invalid|Nonexistent|Cannot call|null instance|Out of bounds" /tmp/smoke.log \
              && echo "!!! ERREURS RUNTIME dans $scene !!!" \
              || echo "$scene : OK (aucune erreur runtime)"
          done
          exit 0

      - name: Bump APK version from build number
        run: |
          sed -i "s|^version/code=.*|version/code=${GITHUB_RUN_NUMBER}|" export_presets.cfg
          sed -i "s|^version/name=.*|version/name=\"0.${GITHUB_RUN_NUMBER}\"|" export_presets.cfg
          sed -i "s|^config/version=.*|config/version=\"0.${GITHUB_RUN_NUMBER}\"|" project.godot
          grep '^version/' export_presets.cfg
          grep '^config/version' project.godot

      # Décode le keystore (secret base64) et expose les variables que Godot lit
      # pour signer en release. Sans secret, on reste en debug.
      - name: Prépare la signature release (si le keystore est configuré)
        id: signing
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > /tmp/release.keystore
            echo "GODOT_ANDROID_KEYSTORE_RELEASE_PATH=/tmp/release.keystore" >> "$GITHUB_ENV"
            echo "GODOT_ANDROID_KEYSTORE_RELEASE_USER=$ANDROID_KEYSTORE_USER" >> "$GITHUB_ENV"
            echo "GODOT_ANDROID_KEYSTORE_RELEASE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD" >> "$GITHUB_ENV"
            echo "mode=release" >> "$GITHUB_OUTPUT"
            echo "Keystore détecté → APK signée en RELEASE."
          else
            echo "mode=debug" >> "$GITHUB_OUTPUT"
            echo "Aucun keystore configuré → APK DEBUG (repli)."
          fi

      - name: Build APK
        run: |
          mkdir -v -p build/android
          OUT="$(readlink -f build)/android/${EXPORT_NAME}-v0.${GITHUB_RUN_NUMBER}.apk"
          if [ "${{ steps.signing.outputs.mode }}" = "release" ]; then
            godot --headless --verbose --export-release "Android" "$OUT"
          else
            godot --headless --verbose --export-debug "Android" "$OUT"
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: eneko-apk
          path: build/android/${{ env.EXPORT_NAME }}-v0.${{ github.run_number }}.apk

      - name: Publish APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Eneko v0.${{ github.run_number }}"
          body: |
            ![Eneko, la Voie du Sabre](https://raw.githubusercontent.com/Astely38/Jeu-Android-2/main/docs/banner.png)

            ## Eneko, la Voie du Sabre — v0.${{ github.run_number }}

            Un jeune samouraï, le sabre de son grand-père au poing, traverse forêts
            de bambous, temples oubliés et reflets brisés pour rallumer la Flamme
            d'Aube. **15 niveaux, 3 chapitres**, un niveau secret et des combats de boss.

            ### 📥 Installer sur Android
            1. Sur ton téléphone, télécharge **`eneko-v0.${{ github.run_number }}.apk`** ci-dessous (section *Assets*).
            2. Ouvre le fichier ; autorise l'installation depuis une « source inconnue » si demandé.
            3. Lance **Eneko, la Voie du Sabre** et bonne aventure !

            ### 🎮 Au programme
            - 15 niveaux en 3 chapitres — difficulté croissante (facile → moyen → difficile)
            - Sabre, **ruée** invincible, double saut, esprits, corbeaux-démons et Oni au pavois
            - Orbes à récolter, **reliques** cachées, **succès**, grades et chrono par niveau
            - Musiques d'ambiance, effets sonores et décors peints à la main

            ### 🕹️ Contrôles tactiles
            Gauche / Droite · **Ruée** · Saut (maintenir = plus haut) · Attaque au sabre

            ---
            *Version 0.${{ github.run_number }} (versionCode ${{ github.run_number }}) — build **${{ steps.signing.outputs.mode }}**, commit ${{ github.sha }}.*
          prerelease: true
          files: build/android/${{ env.EXPORT_NAME }}-v0.${{ github.run_number }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Ne garde que la dernière release : supprime toutes les anciennes releases
  # « build-* » ET leurs tags. Job séparé sur le runner hôte (et non dans le
  # conteneur godot-ci) pour disposer de la CLI `gh`. Le GITHUB_TOKEN du CI a
  # les droits (contents: write), contrairement à un push de suppression manuel.
  cleanup-releases:
    name: Nettoyage des anciennes releases
    needs: export-android
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Supprime les anciennes releases et tags (garde la dernière)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KEEP: "1"
          CURRENT_TAG: build-${{ github.run_number }}
        run: |
          gh release list --repo "$GITHUB_REPOSITORY" --limit 500 \
            --json tagName,createdAt \
            --jq 'sort_by(.createdAt) | reverse | .[].tagName' > /tmp/tags.txt
          echo "Releases existantes :"; cat /tmp/tags.txt
          # On saute les KEEP plus récentes, puis on supprime les « build-* »
          # restantes (release + tag). On protège explicitement le tag courant.
          tail -n +$(( KEEP + 1 )) /tmp/tags.txt | grep '^build-' | while read -r tag; do
            if [ "$tag" = "$CURRENT_TAG" ]; then continue; fi
            echo "Suppression de $tag (release + tag)"
            gh release delete "$tag" --repo "$GITHUB_REPOSITORY" --cleanup-tag --yes || true
          done
          echo "Releases nettoyées."

      # Deuxième passe : supprime les tags « build-* » orphelins (sans release
      # associée, donc invisibles pour la passe ci-dessus), en gardant le tag
      # courant. Rend la liste des tags aussi propre que celle des releases.
      - name: Supprime les tags build-* orphelins restants
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CURRENT_TAG: build-${{ github.run_number }}
        run: |
          gh api "repos/$GITHUB_REPOSITORY/git/refs/tags" --paginate --jq '.[].ref' \
            | sed 's#refs/tags/##' | grep '^build-' | while read -r tag; do
              if [ "$tag" = "$CURRENT_TAG" ]; then continue; fi
              echo "Suppression du tag orphelin $tag"
              gh api -X DELETE "repos/$GITHUB_REPOSITORY/git/refs/tags/$tag" || true
            done
          echo "Nettoyage terminé."
