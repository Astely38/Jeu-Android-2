name: Build Android APK

on:
  push:
  workflow_dispatch: {}

env:
  GODOT_VERSION: 4.6.3
  EXPORT_NAME: eneko

permissions:
  contents: write

jobs:
  export-android:
    name: Export Android APK
    runs-on: ubuntu-24.04
    container:
      image: barichello/godot-ci:4.6.3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup export templates and Android/Java editor config
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates/
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          mkdir -v -p ~/.config/
          mv /root/.config/godot ~/.config/godot

      - name: Import project resources
        run: godot --headless --verbose --editor --quit

      - name: Build debug APK
        run: |
          mkdir -v -p build/android
          godot --headless --verbose --export-debug "Android" "$(readlink -f build)/android/${EXPORT_NAME}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: eneko-apk
          path: build/android/${{ env.EXPORT_NAME }}.apk

      - name: Publish APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Build #${{ github.run_number }}"
          body: "APK généré automatiquement depuis le commit ${{ github.sha }}."
          prerelease: true
          files: build/android/${{ env.EXPORT_NAME }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
