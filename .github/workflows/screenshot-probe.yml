name: Screenshot Probe

# Capture de vraies images rendues, en CI, de tout le jeu — les 21 niveaux
# et les écrans hors-niveau (splash, menu, sélection) — pour un audit visuel
# à grande échelle (headless ne rend RIEN — il faut un faux écran + un vrai
# pilote de rendu). Job séparé du pipeline de build principal pour ne rien
# risquer dessus. Utilise deux autoloads inertes hors CI :
# tools/ci_waypoint_shooter.gd (CI_SHOOT_WAYPOINTS=1) téléporte le joueur à
# plusieurs points de repère répartis sur un niveau ; tools/ci_menu_shooter.gd
# (CI_SHOOT_MENU=1) ouvre chaque panneau d'un écran d'interface. Chaque scène
# est chargée normalement comme scène principale (comme en jeu, pas
# d'instanciation manuelle — une tentative précédente instanciait le niveau
# à la main et ne produisait que des captures vides, la caméra ne s'activant
# pas dans ce contexte). Le résultat est poussé sur la branche
# ci-screenshots (dépôt git frais, indépendant du checkout principal —
# l'API de téléchargement des artefacts, sur Azure Blob, n'est pas
# accessible depuis la session qui pilote cette CI).

on:
  workflow_dispatch: {}

env:
  GODOT_VERSION: 4.6.3

permissions:
  contents: write

jobs:
  probe:
    name: Capture screenshots (audit visuel complet)
    runs-on: ubuntu-24.04
    container:
      image: barichello/godot-ci:4.6.3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup export templates and Android/Java editor config
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates/
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          mkdir -v -p ~/.config/
          mv /root/.config/godot ~/.config/godot

      - name: Import project resources
        run: godot --headless --verbose --editor --quit

      - name: Install Xvfb + Mesa (faux écran + rendu logiciel)
        run: |
          apt-get update -qq
          apt-get install -y -qq xvfb libgl1-mesa-dri mesa-utils

      # Plusieurs points de repère par niveau (voir
      # tools/ci_waypoint_shooter.gd), au lieu d'un seul point de vue figé
      # au spawn. Le niveau est lancé normalement (comme scène principale),
      # l'autoload ne s'active que via CI_SHOOT_WAYPOINTS=1. Tous les
      # niveaux (1 à 20 + secret) plutôt que le seul Chapitre IV, pour un
      # audit visuel complet du jeu.
      - name: Capture screenshots (tous les niveaux, multi-waypoints)
        run: |
          set +e
          mkdir -p ci_shots
          for lvl in level_1 level_2 level_3 level_4 level_5 level_6 level_7 level_8 level_9 level_10 level_11 level_12 level_13 level_14 level_15 level_16 level_17 level_18 level_19 level_20 level_secret; do
            echo "=== Capture: $lvl ==="
            CI_SHOOT_WAYPOINTS=1 CI_SHOOT_LEVEL="$lvl" CI_SHOOT_OUT=ci_shots \
              xvfb-run -a -s "-screen 0 1280x720x24" \
              godot --path . "res://levels/${lvl}.tscn" \
              --rendering-driver opengl3 2>&1 | tail -40
          done
          echo "--- ci_shots content ---"
          ls -la ci_shots/
          exit 0

      # Écrans hors-niveau (voir tools/ci_menu_shooter.gd) : splash, menu
      # principal (+ prologue/options/crédits/succès) et sélection de
      # niveau — l'autoload ne s'active que via CI_SHOOT_MENU=1.
      - name: Capture screenshots (écrans hors-niveau)
        run: |
          set +e
          mkdir -p ci_shots
          for scn in splash main_menu level_select; do
            echo "=== Capture: $scn ==="
            CI_SHOOT_MENU=1 CI_SHOOT_SCENE="$scn" CI_SHOOT_OUT=ci_shots \
              xvfb-run -a -s "-screen 0 1280x720x24" \
              godot --path . "res://scenes/${scn}.tscn" \
              --rendering-driver opengl3 2>&1 | tail -40
          done
          echo "--- ci_shots content ---"
          ls -la ci_shots/
          exit 0

      - name: Upload probe result (even if empty)
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-probe
          path: ci_shots/
          if-no-files-found: warn

      - name: Push screenshots to ci-screenshots branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$(ls -A ci_shots/ 2>/dev/null)" ]; then
            echo "Rien à pousser (dossier vide)."
            exit 0
          fi
          rm -rf /tmp/shots_push
          mkdir -p /tmp/shots_push
          cp -r ci_shots/. /tmp/shots_push/
          cd /tmp/shots_push
          git init -q
          git config user.name "ci-screenshots-bot"
          git config user.email "actions@github.com"
          git add -A
          git commit -q -m "Audit visuel complet ($GITHUB_SHA)"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push -f origin HEAD:ci-screenshots
