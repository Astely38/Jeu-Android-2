<svg xmlns="http://www.w3.org/2000/svg" width="64" height="96" viewBox="0 0 64 96">
  <!-- Katana (behind body), pointing up-right -->
  <polygon points="48.9,57.5 45.1,56.5 58.1,9.5 61.9,10.5" fill="#dfe6ee" stroke="#aeb9c6" stroke-width="0.6"/>
  <polygon points="43,55 51,58 50,61 42,58" fill="#8a6d3b"/>
  <polygon points="44,58 47.5,59.5 44.5,66 41,64.5" fill="#3b2f2f"/>

  <!-- Legs (hakama) -->
  <rect x="20" y="64" width="10" height="28" rx="3" fill="#33415c"/>
  <rect x="34" y="64" width="10" height="28" rx="3" fill="#33415c"/>

  <!-- Body (gi) -->
  <rect x="16" y="34" width="32" height="34" rx="6" fill="#3a6ea5"/>
  <polygon points="32,34 44,40 44,66 32,66" fill="#2f5c8a"/>
  <!-- Obi (sash) -->
  <rect x="16" y="55" width="32" height="7" fill="#c1440e"/>

  <!-- Arms -->
  <rect x="12" y="38" width="8" height="20" rx="4" fill="#3a6ea5"/>
  <rect x="44" y="38" width="8" height="20" rx="4" fill="#3a6ea5"/>
  <!-- Hand holding the katana -->
  <circle cx="47" cy="57" r="4" fill="#e8b98a"/>

  <!-- Head -->
  <circle cx="30" cy="22" r="14" fill="#f0c19a"/>
  <!-- Hair -->
  <path d="M16 24 Q15 6 30 6 Q45 6 44 24 L44 17 Q40 12 30 12 Q20 12 18 18 Z" fill="#20242b"/>
  <path d="M18 16 Q30 10 42 16 L42 23 Q30 16 18 23 Z" fill="#20242b"/>
  <!-- Eyes -->
  <circle cx="26" cy="24" r="2" fill="#20242b"/>
  <circle cx="36" cy="24" r="2" fill="#20242b"/>
  <!-- Earring (gold hoop) -->
  <circle cx="42.5" cy="30" r="3.2" fill="none" stroke="#f2c14e" stroke-width="2"/>
</svg>
